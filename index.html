  /* ── Header ── */
  header {
    width: 100%;
    max-width: 540px;
    padding: 1.5rem 1.5rem .75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .3rem;
  }

  .brand-tag {
    font-size: 10px;
    color: #3a3060;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .brand-name {
    font-size: 13px;
    color: #534ab7;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
  }

  .brand-name:hover { color: #7f77dd; }

  .divider {
    width: 60px;
    height: 1px;
    background: #1a1530;
    margin: .5rem 0;
  }

  /* ── Main card ── */
  main {
    width: 100%;
    max-width: 540px;
    padding: 0 1.25rem 3rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Start screen ── */
  #v-start { text-align: center; max-width: 420px; padding: 1rem 0; }

  .crest {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid #534ab7;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 32px;
    color: #c9a84c;
    background: rgba(13,10,24,0.82);
  }

  .quiz-title {
    font-size: 28px;
    color: #c9a84c;
    font-weight: normal;
    margin-bottom: .4rem;
    line-height: 1.3;
  }

  .quiz-sub {
    color: #5a5070;
    font-style: italic;
    line-height: 1.9;
    font-size: 15px;
    margin-bottom: .5rem;
  }

  .quiz-hint {
    color: #2e2848;
    font-size: 12px;
    margin-bottom: 2rem;
  }

  /* ── Buttons ── */
  .btn-primary {
    background: #26215c;
    color: #c9a84c;
    border: 1px solid #534ab7;
    padding: .9rem 2.5rem;
    font-size: 16px;
    font-family: Georgia, serif;
    cursor: pointer;
    border-radius: 6px;
    letter-spacing: 1px;
    transition: background .2s, border-color .2s;
  }
  .btn-primary:hover { background: #3c3489; border-color: #7f77dd; }

  .btn-secondary {
    background: rgba(13,10,24,0.82);
    color: #e8e0f0;
    border: 1px solid #231d38;
    padding: .7rem 1.8rem;
    font-size: 14px;
    font-family: Georgia, serif;
    cursor: pointer;
    border-radius: 6px;
    transition: background .2s;
  }
  .btn-secondary:hover { background: #1e1830; border-color: #534ab7; }

  /* ── Quiz screen ── */
  #v-quiz { display: none; width: 100%; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: .4rem;
  }

  .progress-label { font-size: 11px; color: #534ab7; letter-spacing: 2px; text-transform: uppercase; }
  .progress-pct   { font-size: 11px; color: #2e2848; }

  .progress-track {
    background: rgba(13,10,24,0.82);
    border-radius: 4px;
    height: 3px;
    margin-bottom: 1.75rem;
    overflow: hidden;
  }

  #q-bar {
    background: #534ab7;
    height: 3px;
    border-radius: 4px;
    width: 0%;
    transition: width .4s ease;
  }

  #q-text {
    font-size: 16px;
    color: #e8e0f0;
    line-height: 1.9;
    margin-bottom: 1.5rem;
    font-style: italic;
    min-height: 60px;
  }

  .choices { display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    text-align: left;
    padding: .9rem 1.1rem;
    width: 100%;
    background: rgba(13,10,24,0.82);
    border: 1px solid #231d38;
    color: #c8c0d8;
    border-radius: 8px;
    cursor: pointer;
    font-family: Georgia, serif;
    font-size: 14px;
    line-height: 1.7;
    transition: background .15s, border-color .15s;
  }
  .choice-btn:hover { background: #1e1830; border-color: #534ab7; color: #e8e0f0; }
  .choice-btn:active { background: #2a2248; }

  /* ── Result screen ── */
  #v-result { display: none; width: 100%; }

  .result-header { text-align: center; margin-bottom: 1.75rem; }

  .choixpeau-label {
    font-size: 10px;
    color: #534ab7;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: .75rem;
  }

  .house-crest {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto .75rem;
    border: 2px solid;
  }

  .house-name { font-size: 28px; font-weight: normal; margin-bottom: .2rem; }
  .house-trait { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1rem; }
  .house-desc { color: #a098b8; font-style: italic; line-height: 1.9; font-size: 14px; }

  .compat-card {
    background: rgba(13,10,24,0.82);
    border: 1px solid #1a1530;
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .compat-title {
    font-size: 10px;
    color: #2e2848;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 1rem;
  }

  .bar-row { margin-bottom: .75rem; }
  .bar-label { display: flex; justify-content: space-between; margin-bottom: .3rem; }
  .bar-track { background: rgba(5,3,12,0.75); border-radius: 3px; height: 7px; overflow: hidden; }
  .bar-fill   { height: 7px; border-radius: 3px; }

  /* ── TikTok CTA ── */
  .tiktok-cta {
    background: rgba(5,3,12,0.75);
    border: 1px solid #1a1530;
    border-radius: 10px;
    padding: 1.25rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .tiktok-cta p {
    font-size: 15px;
    color: #c9a84c;
    margin-bottom: .3rem;
    font-style: italic;
  }

  .tiktok-cta small {
    font-size: 12px;
    color: #3a3060;
    display: block;
    margin-bottom: .75rem;
  }

  .tiktok-handle {
    font-size: 13px;
    color: #534ab7;
    letter-spacing: 1px;
  }

  .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* ── Footer ── */
  footer {
    width: 100%;
    max-width: 540px;
    padding: 1rem 1.5rem 2rem;
    text-align: center;
  }

  footer a {
    font-size: 12px;
    color: #2e2848;
    text-decoration: none;
    letter-spacing: 1px;
  }
  footer a:hover { color: #534ab7; }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .quiz-title { font-size: 24px; }
    #q-text { font-size: 15px; }
    .choice-btn { font-size: 13px; }
  }
</style>
</head>
<body>

<div style="position:fixed;inset:0;background:rgba(5,3,12,0.72);pointer-events:none;z-index:0;"></div>
<header style="position:relative;z-index:1;">
  <span class="brand-tag">✦ Créé par</span>
  <a class="brand-name" href="https://www.tiktok.com/@lesarchivesdepoudlard" target="_blank">@lesarchivesdepoudlard</a>
  <div class="divider"></div>
</header>

<main style="position:relative;z-index:1;">

  <!-- ── ÉCRAN DÉMARRAGE ── -->
  <div id="v-start">
    <div class="crest">⚡</div>
    <h1 class="quiz-title">Le Choixpeau Magique</h1>
    <p class="quiz-sub">10 situations. Des choix moraux.<br>Une maison qui te correspond vraiment.</p>
    <p class="quiz-hint">Réponds instinctivement — sans chercher à influencer le résultat.</p>
    <button class="btn-primary" onclick="startQuiz()">Mettre le Choixpeau</button>
  </div>

  <!-- ── ÉCRAN QUIZ ── -->
  <div id="v-quiz">
    <div class="progress-header">
      <span class="progress-label" id="q-num"></span>
      <span class="progress-pct" id="q-pct"></span>
    </div>
    <div class="progress-track"><div id="q-bar"></div></div>
    <p id="q-text"></p>
    <div class="choices" id="q-choices"></div>
  </div>

  <!-- ── ÉCRAN RÉSULTAT ── -->
  <div id="v-result"></div>

</main>

<footer style="position:relative;z-index:1;">
  <a href="https://www.tiktok.com/@lesarchivesdepoudlard" target="_blank">@lesarchivesdepoudlard sur TikTok</a>
</footer>

<script>
const QS = [
  {q:"Tu trouves une baguette magique abandonnée dans la Forêt Interdite. Que fais-tu ?",cs:[
    {t:"Tu la prends — prêt·e à défendre ce droit face à n'importe qui",h:'G'},
    {t:"Tu la rapportes immédiatement, elle appartient sûrement à quelqu'un",h:'H'},
    {t:"Tu l'examines longuement pour percer les secrets de sa magie",h:'R'},
    {t:"Tu la gardes discrètement — un tel avantage ne se refuse pas",h:'S'}
  ]},
  {q:"Ton meilleur ami triche à un examen crucial. Tu es le seul à l'avoir vu.",cs:[
    {t:"Tu l'affrontes directement — la vérité avant l'amitié",h:'G'},
    {t:"Tu lui parles en privé et l'incites à avouer lui-même",h:'H'},
    {t:"Tu évalues les conséquences dans les deux sens avant d'agir",h:'R'},
    {t:"Tu gardes l'information — elle pourra être utile un jour",h:'S'}
  ]},
  {q:"Pour sauver un inconnu, tu dois enfreindre une règle importante de Poudlard.",cs:[
    {t:"Tu agis sans hésiter — une vie vaut plus que n'importe quelle règle",h:'G'},
    {t:"Tu cherches d'abord une alternative, mais tu enfreindrais si vraiment nécessaire",h:'H'},
    {t:"Tu analyses si la règle comporte des exceptions applicables ici",h:'R'},
    {t:"Tu pèses soigneusement les risques pour toi avant d'intervenir",h:'S'}
  ]},
  {q:"Tu découvres dans un vieux grimoire un sort interdit extrêmement puissant.",cs:[
    {t:"Tu l'apprends pour pouvoir protéger ceux que tu aimes",h:'G'},
    {t:"Tu en informes un professeur de confiance immédiatement",h:'H'},
    {t:"Tu l'étudies avec passion — le savoir est neutre, c'est l'intention qui compte",h:'R'},
    {t:"Tu le maîtrises en secret — le pouvoir se mérite et se conserve",h:'S'}
  ]},
  {q:"Un professeur te reproche injustement devant toute la classe.",cs:[
    {t:"Tu te défends publiquement sur-le-champ — tu n'as rien à te reprocher",h:'G'},
    {t:"Tu encaisses sans répondre et règles ça calmement en privé",h:'H'},
    {t:"Tu exposes les faits qui prouvent ton innocence avec précision",h:'R'},
    {t:"Tu gardes ton calme et attends le bon moment pour rétablir ta réputation",h:'S'}
  ]},
  {q:"Tu vois un élève plus faible se faire harceler dans un couloir.",cs:[
    {t:"Tu t'interposes immédiatement, seul·e si nécessaire",h:'G'},
    {t:"Tu restes auprès de la victime pendant que tu appelles du renfort",h:'H'},
    {t:"Tu identifies la meilleure stratégie pour que ça cesse durablement",h:'R'},
    {t:"Tu interviens uniquement si l'élève est quelqu'un que tu connais",h:'S'}
  ]},
  {q:"On te propose une mission secrète et risquée pour protéger Poudlard.",cs:[
    {t:"Tu acceptes sans hésiter — c'est exactement pour ça que tu es là",h:'G'},
    {t:"Tu acceptes à condition d'agir en équipe, pas seul·e",h:'H'},
    {t:"Tu veux comprendre tous les enjeux en détail avant de décider",h:'R'},
    {t:"Tu négocies une contrepartie à la hauteur du risque demandé",h:'S'}
  ]},
  {q:"On t'offre la possibilité de lire les pensées d'un professeur pendant 1 minute.",cs:[
    {t:"Tu cherches des injustices envers des élèves pour les réparer",h:'G'},
    {t:"Tu refuses catégoriquement — c'est une violation de la vie privée",h:'H'},
    {t:"Tu explores ses connaissances secrètes sur la magie avancée",h:'R'},
    {t:"Tu cherches des informations qui pourraient te donner un avantage",h:'S'}
  ]},
  {q:"Quelle victoire te rendrait le plus fier·e ?",cs:[
    {t:"Avoir protégé quelqu'un au péril de ta propre vie",h:'G'},
    {t:"Être reconnu·e comme quelqu'un sur qui on peut absolument compter",h:'H'},
    {t:"Avoir résolu un mystère magique que personne n'avait percé",h:'R'},
    {t:"Avoir atteint un objectif que tout le monde croyait impossible",h:'S'}
  ]},
  {q:"Le Choixpeau hésite pour toi entre deux maisons. Il te demande ton avis.",cs:[
    {t:"\"Mets-moi là où je pourrai faire le plus de bien autour de moi\"",h:'G'},
    {t:"\"Là où ma loyauté et mon engagement compteront vraiment\"",h:'H'},
    {t:"\"Là où je pourrai apprendre et comprendre sans limite\"",h:'R'},
    {t:"\"Là où j'aurai les meilleures chances de réaliser mes ambitions\"",h:'S'}
  ]}
];

const HS = {
  G:{name:'Gryffondor', sym:'⚡', bg:'#3d0000', border:'#D3A625', light:'#f5c842', trait:'Bravoure & Honneur',
     desc:"Tu agis avant de réfléchir — et c'est souvent ce qui fait la différence. Tu ne supportes pas l'injustice et tu seras toujours le premier à t'interposer, même seul contre tous. Ton courage peut friser l'imprudence, mais il inspire ceux qui t'entourent."},
  H:{name:'Poufsouffle', sym:'✿', bg:'#3a2e00', border:'#F0C75E', light:'#e6b84a', trait:'Loyauté & Justice',
     desc:"Ta force, c'est ta constance. Là où d'autres s'emballent ou calculent, toi tu tiens parole. On peut compter sur toi absolument — et les gens le savent. Tu es le genre de personne qu'on veut dans son équipe quand ça devient vraiment difficile."},
  R:{name:'Serdaigle', sym:'◈', bg:'#001030', border:'#946B2D', light:'#7ea8e0', trait:'Sagesse & Curiosité',
     desc:"Tu ne peux pas t'empêcher de comprendre comment les choses fonctionnent. Avant d'agir, tu observes. Tu poses les questions que les autres n'osent pas. Ta plus grande arme, c'est ton esprit — et tu le sais."},
  S:{name:'Serpentard', sym:'◉', bg:'#001a0e', border:'#aaaaaa', light:'#7abf8e', trait:'Ambition & Détermination',
     desc:"Tu sais ce que tu veux et tu sais comment l'obtenir. Tu n'es pas cruel — tu es stratégique. Là où d'autres voient des obstacles, tu vois des opportunités. Ta détermination fait peur à certains. C'est leur problème."}
};

let ST = { qIdx:0, scores:{G:0,H:0,R:0,S:0}, shuffled:[] };

function shuf(a) { return [...a].sort(() => Math.random() - .5); }
function $(id)   { return document.getElementById(id); }

function showV(id) {
  ['v-start','v-quiz','v-result'].forEach(v => {
    const e = $(v);
    if (e) e.style.display = v === id ? 'block' : 'none';
  });
}

function startQuiz() {
  ST = { qIdx:0, scores:{G:0,H:0,R:0,S:0}, shuffled: QS.map(q => ({q:q.q, cs:shuf(q.cs)})) };
  showV('v-quiz');
  renderQ();
}

function renderQ() {
  const q   = ST.shuffled[ST.qIdx];
  const pct = Math.round(ST.qIdx / QS.length * 100);
  $('q-num').textContent  = 'Question ' + (ST.qIdx + 1) + ' sur ' + QS.length;
  $('q-pct').textContent  = pct + '%';
  $('q-bar').style.width  = pct + '%';
  $('q-text').textContent = q.q;
  $('q-choices').innerHTML = q.cs.map(c =>
    `<button class="choice-btn" onclick="answer('${c.h}')">${c.t}</button>`
  ).join('');
}

function answer(h) {
  ST.scores[h]++;
  ST.qIdx++;
  if (ST.qIdx >= QS.length) showResult();
  else renderQ();
}

function showResult() {
  const total = Object.values(ST.scores).reduce((a,b) => a+b, 0);
  const pcts  = {};
  Object.keys(ST.scores).forEach(k => pcts[k] = Math.round(ST.scores[k] / total * 100));
  const sorted = Object.keys(pcts).sort((a,b) => pcts[b] - pcts[a]);
  const win    = sorted[0];
  const hw     = HS[win];

  const bars = sorted.map(k => {
    const h   = HS[k];
    const isW = k === win;
    return `
      <div class="bar-row">
        <div class="bar-label">
          <span style="font-size:13px;color:${isW ? h.light : '#4a4060'};font-weight:${isW ? 'bold' : 'normal'}">${h.name}</span>
          <span style="font-size:13px;color:${isW ? h.light : '#2e2848'}">${pcts[k]}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pcts[k]}%;background:${isW ? h.light : '#2a2040'};"></div>
        </div>
      </div>`;
  }).join('');

  const shareText = encodeURIComponent(`Je suis ${hw.name} à ${pcts[win]}% 🔮 Découvre ta maison sur @lesarchivesdepoudlard !`);

  $('v-result').innerHTML = `
    <div class="result-header">
      <p class="choixpeau-label">✦ Le Choixpeau a parlé ✦</p>
      <div class="house-crest" style="background:${hw.bg};border-color:${hw.border};color:${hw.light};">${hw.sym}</div>
      <h2 class="house-name" style="color:${hw.light};">${hw.name}</h2>
      <p class="house-trait" style="color:${hw.border};">${hw.trait}</p>
      <p class="house-desc">${hw.desc}</p>
    </div>

    <div class="compat-card">
      <p class="compat-title">Compatibilité avec les 4 maisons</p>
      ${bars}
    </div>

    <div class="tiktok-cta">
      <p>🎉 Partage ta maison en commentaire 👇</p>
      <small>Et dis-nous si tu es d'accord avec le Choixpeau !</small>
      <span class="tiktok-handle">@lesarchivesdepoudlard</span>
    </div>

    <div class="result-actions">
      <button class="btn-secondary" onclick="startQuiz()">Recommencer</button>
      <a class="btn-secondary" style="text-decoration:none;display:inline-flex;align-items:center;"
         href="https://www.tiktok.com/@lesarchivesdepoudlard" target="_blank">Suivre sur TikTok</a>
    </div>
  `;
  showV('v-result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

showV('v-start');
</script>
</body>
</html>
